name: Enrich Brand Contacts

on:
  workflow_dispatch:
    inputs:
      max_brands:
        description: 'Max brands to process (leave empty for all)'
        required: false
        default: ''
      start_row:
        description: 'Start at row number (2 = first brand)'
        required: false
        default: '2'

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Run enrichment
        env:
          ROCKETREACH_API_KEY: ${{ secrets.ROCKETREACH_API_KEY }}
        run: |
          ARGS="--input brand_prospecting_list.xlsx --output brand_prospecting_list.xlsx"
          if [ -n "${{ github.event.inputs.max_brands }}" ]; then
            ARGS="$ARGS --max ${{ github.event.inputs.max_brands }}"
          fi
          if [ -n "${{ github.event.inputs.start_row }}" ]; then
            ARGS="$ARGS --start-row ${{ github.event.inputs.start_row }}"
          fi
          python enrich_contacts.py $ARGS

      - name: Upload enriched spreadsheet
        uses: actions/upload-artifact@v4
        with:
          name: enriched-brand-list-${{ github.run_number }}
          path: brand_prospecting_list.xlsx

      - name: Commit updated file back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brand_prospecting_list.xlsx
          git diff --staged --quiet || git commit -m "Enriched contacts - run ${{ github.run_number }}"
          git push
